<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صالون المغيني – إدارة أحمد المغيني</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #2a2a2a;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dim: rgba(201,168,76,0.15);
    --text: #f0ead6;
    --text-dim: #8a8070;
    --red: #c0392b;
    --green: #27ae60;
    --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    min-height: 100vh;
    background-image: radial-gradient(ellipse at 20% 20%, rgba(201,168,76,0.04) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 80%, rgba(201,168,76,0.03) 0%, transparent 60%);
  }

  /* ====== HEADER ====== */
  header {
    text-align: center;
    padding: 48px 20px 32px;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 200px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .logo-icon { font-size: 48px; margin-bottom: 8px; display: block; }
  header h1 {
    font-size: clamp(24px, 5vw, 40px);
    font-weight: 900;
    color: var(--gold);
    letter-spacing: 1px;
  }
  header p { color: var(--text-dim); font-size: 14px; margin-top: 4px; }
  .whatsapp-btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: #25D366; color: #fff;
    padding: 8px 18px; border-radius: 30px;
    font-size: 13px; font-weight: 700;
    text-decoration: none; margin-top: 14px;
    transition: opacity .2s;
  }
  .whatsapp-btn:hover { opacity: .85; }

  /* ====== NAV ====== */
  nav {
    display: flex; justify-content: center; gap: 8px;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .tab-btn {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text-dim); padding: 8px 20px; border-radius: 30px;
    cursor: pointer; font-family: 'Cairo', sans-serif; font-size: 14px;
    font-weight: 600; transition: all .2s;
  }
  .tab-btn.active, .tab-btn:hover {
    background: var(--gold-dim); border-color: var(--gold); color: var(--gold);
  }

  /* ====== MAIN ====== */
  main { max-width: 600px; margin: 0 auto; padding: 24px 16px 80px; }
  .section { display: none; }
  .section.active { display: block; }

  /* ====== QUEUE BANNER ====== */
  .queue-banner {
    background: var(--gold-dim); border: 1px solid var(--gold);
    border-radius: var(--radius); padding: 14px 20px;
    text-align: center; margin-bottom: 24px;
    animation: pulse-border 2s infinite;
  }
  @keyframes pulse-border {
    0%,100% { border-color: var(--gold); }
    50% { border-color: transparent; }
  }
  .queue-banner .num { font-size: 36px; font-weight: 900; color: var(--gold); }
  .queue-banner small { color: var(--text-dim); font-size: 13px; }

  /* ====== FORM ====== */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px; margin-bottom: 16px;
  }
  .card h3 { font-size: 16px; font-weight: 700; color: var(--gold); margin-bottom: 14px; }

  label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 6px; }
  input[type=text] {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: 'Cairo', sans-serif;
    font-size: 15px; padding: 12px 14px; outline: none; transition: border-color .2s;
  }
  input[type=text]:focus { border-color: var(--gold); }

  /* Services grid */
  .services-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media(max-width:400px){ .services-grid { grid-template-columns: 1fr; } }
  .service-card {
    background: var(--surface2); border: 2px solid var(--border);
    border-radius: 10px; padding: 14px 12px; cursor: pointer;
    transition: all .2s; text-align: center;
  }
  .service-card:hover { border-color: var(--gold); background: var(--gold-dim); }
  .service-card.selected { border-color: var(--gold); background: var(--gold-dim); }
  .service-card .svc-icon { font-size: 28px; margin-bottom: 6px; display: block; }
  .service-card .svc-name { font-size: 14px; font-weight: 700; }
  .service-card .svc-price { font-size: 13px; color: var(--gold); font-weight: 700; margin-top: 4px; }
  .service-card .svc-dur { font-size: 11px; color: var(--text-dim); }

  /* Barbers */
  .barbers-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .barber-card {
    flex: 1; min-width: 100px; background: var(--surface2);
    border: 2px solid var(--border); border-radius: 10px;
    padding: 14px 10px; cursor: pointer; text-align: center; transition: all .2s;
  }
  .barber-card:hover { border-color: var(--gold); }
  .barber-card.selected { border-color: var(--gold); background: var(--gold-dim); }
  .barber-avatar { font-size: 30px; margin-bottom: 6px; }
  .barber-name { font-size: 13px; font-weight: 700; }

  /* Time slots */
  .slots-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  @media(max-width:350px){ .slots-grid { grid-template-columns: repeat(3,1fr); } }
  .slot {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 4px; text-align: center;
    font-size: 13px; font-weight: 600; cursor: pointer; transition: all .2s;
  }
  .slot:hover { border-color: var(--gold); color: var(--gold); }
  .slot.selected { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); }
  .slot.booked { background: rgba(192,57,43,0.1); border-color: #c0392b55; color: var(--text-dim); cursor: not-allowed; text-decoration: line-through; }

  /* Submit */
  .btn-submit {
    width: 100%; padding: 16px; border: none; border-radius: var(--radius);
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: #111; font-family: 'Cairo', sans-serif;
    font-size: 17px; font-weight: 900; cursor: pointer;
    transition: opacity .2s, transform .1s; letter-spacing: .5px;
    margin-top: 8px;
  }
  .btn-submit:hover { opacity: .9; transform: translateY(-1px); }
  .btn-submit:active { transform: translateY(0); }
  .btn-submit:disabled { opacity: .4; cursor: not-allowed; }

  /* ====== CONFIRMATION ====== */
  .confirm-overlay {
    display: none; position: fixed; inset: 0; z-index: 999;
    background: rgba(0,0,0,.85); backdrop-filter: blur(4px);
    align-items: center; justify-content: center; padding: 20px;
  }
  .confirm-overlay.show { display: flex; }
  .confirm-box {
    background: var(--surface); border: 1px solid var(--gold);
    border-radius: 16px; padding: 32px 24px; max-width: 380px; width: 100%;
    text-align: center; animation: pop .3s ease;
  }
  @keyframes pop { from { transform: scale(.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .confirm-box .check { font-size: 56px; margin-bottom: 12px; }
  .confirm-box h2 { color: var(--gold); font-size: 22px; margin-bottom: 8px; }
  .confirm-box .details { background: var(--surface2); border-radius: 10px; padding: 14px; margin: 16px 0; text-align: right; }
  .confirm-box .details p { font-size: 14px; margin-bottom: 6px; }
  .confirm-box .details span { color: var(--gold); font-weight: 700; }
  .wa-confirm {
    display: inline-flex; align-items: center; gap: 8px;
    background: #25D366; color: #fff; border: none;
    padding: 12px 24px; border-radius: 30px;
    font-family: 'Cairo', sans-serif; font-size: 15px; font-weight: 700;
    cursor: pointer; margin-top: 8px; text-decoration: none;
  }
  .btn-close {
    display: block; width: 100%; margin-top: 10px;
    background: transparent; border: 1px solid var(--border);
    color: var(--text-dim); padding: 10px; border-radius: 8px;
    font-family: 'Cairo', sans-serif; font-size: 14px; cursor: pointer;
  }
  .btn-close:hover { border-color: var(--text-dim); }

  /* ====== ADMIN PANEL ====== */
  .admin-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .admin-header h2 { font-size: 18px; font-weight: 700; color: var(--gold); }
  .badge {
    background: var(--gold); color: #111; font-size: 12px;
    font-weight: 900; padding: 3px 10px; border-radius: 20px;
  }
  .booking-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px; margin-bottom: 10px;
    display: flex; align-items: center; justify-content: space-between; gap: 10px;
    animation: fadeIn .3s;
  }
  @keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: none; } }
  .booking-info p { font-size: 14px; font-weight: 700; }
  .booking-info small { font-size: 12px; color: var(--text-dim); }
  .status-badge {
    font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px;
    white-space: nowrap;
  }
  .status-pending { background: rgba(201,168,76,0.15); color: var(--gold); }
  .status-done { background: rgba(39,174,96,0.15); color: var(--green); }
  .btn-done {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text-dim); padding: 6px 12px; border-radius: 8px;
    font-family: 'Cairo', sans-serif; font-size: 12px; cursor: pointer;
    transition: all .2s; white-space: nowrap;
  }
  .btn-done:hover { border-color: var(--green); color: var(--green); }
  .btn-delete {
    background: transparent; border: 1px solid var(--border);
    color: var(--text-dim); padding: 6px 10px; border-radius: 8px;
    font-size: 13px; cursor: pointer; transition: all .2s;
  }
  .btn-delete:hover { border-color: var(--red); color: var(--red); }
  .empty-state { text-align: center; padding: 40px; color: var(--text-dim); }
  .empty-state p { font-size: 14px; margin-top: 8px; }

  /* Stats row */
  .stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 20px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; text-align: center; }
  .stat-card .num { font-size: 28px; font-weight: 900; color: var(--gold); }
  .stat-card small { font-size: 11px; color: var(--text-dim); }

  .admin-login { text-align: center; }
  .admin-login input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: 'Cairo', sans-serif;
    font-size: 15px; padding: 12px 14px; outline: none; margin-bottom: 12px;
    text-align: center; letter-spacing: 4px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<header>
  <span class="logo-icon">✂️</span>
  <h1>صالون المغيني</h1>
  <p>إدارة أحمد المغيني</p>
  <a href="https://wa.me/201270048471" target="_blank" class="whatsapp-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>

  </a>
</header>

<nav>
  <button class="tab-btn active" onclick="showTab('booking')">📅 حجز موعد</button>
  <button class="tab-btn" onclick="showTab('admin')">🛠️ لوحة التحكم</button>
</nav>

<main>
  <!-- ===== BOOKING SECTION ===== -->
  <div id="tab-booking" class="section active">

    <div class="queue-banner">
      <div class="num" id="queue-num">0</div>
      <div>دور قبلك الآن</div>
      <small>تحديث مباشر</small>
    </div>

    <!-- Customer Name -->
    <div class="card">
      <h3>👤 اسمك</h3>
      <label>اكتب اسمك</label>
      <input type="text" id="customer-name" placeholder="مثال: محمد علي">
    </div>

    <!-- Services -->
    <div class="card">
      <h3>✂️ اختر الخدمة</h3>
      <div class="services-grid" id="services-grid"></div>
    </div>

    <!-- Barbers -->
    <div class="card">
      <h3>💈 اختر الحلاق</h3>
      <div class="barbers-row" id="barbers-row"></div>
    </div>

    <!-- Time Slots -->
    <div class="card">
      <h3>🕐 اختر الميعاد</h3>
      <div class="slots-grid" id="slots-grid"></div>
    </div>

    <button class="btn-submit" id="btn-book" onclick="submitBooking()">تأكيد الحجز</button>
  </div>

  <!-- ===== ADMIN SECTION ===== -->
  <div id="tab-admin" class="section">
    <div id="admin-login-section">
      <div class="card admin-login">
        <h3>🔐 دخول الإدارة</h3>
        <label>كلمة المرور</label>
        <input type="password" id="admin-pass" placeholder="••••" onkeydown="if(event.key==='Enter')adminLogin()">
        <button class="btn-submit" onclick="adminLogin()">دخول</button>
      </div>
    </div>

    <div id="admin-panel" style="display:none;">
      <div class="stats-row">
        <div class="stat-card"><div class="num" id="stat-total">0</div><small>إجمالي</small></div>
        <div class="stat-card"><div class="num" id="stat-pending">0</div><small>بانتظار</small></div>
        <div class="stat-card"><div class="num" id="stat-done">0</div><small>منتهية</small></div>
      </div>
      <div class="admin-header">
        <h2>📋 الحجوزات</h2>
        <button class="btn-delete" onclick="clearDone()" style="font-size:12px;padding:6px 12px;">مسح المنتهية</button>
      </div>
      <div id="bookings-list"></div>
    </div>
  </div>
</main>

<!-- CONFIRMATION OVERLAY -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <div class="check">🎉</div>
    <h2>تم الحجز بنجاح!</h2>
    <p style="color:var(--text-dim);font-size:13px;">سيصلك تأكيد على واتساب</p>
    <div class="details" id="confirm-details"></div>
    <a id="wa-link" href="#" target="_blank" class="wa-confirm">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      تأكيد واتساب
    </a>
    <button class="btn-close" onclick="closeConfirm()">✕ إغلاق</button>
  </div>
</div>

<script>
const WHATSAPP_NUMBER = '201270048471';
const ADMIN_PASSWORD = '1234'; // ← غيّر كلمة المرور

const SERVICES = [
  { id: 's1', name: 'حلاقة شعر', icon: '✂️', duration: '30 دقيقة' },
  { id: 's2', name: 'دقن', icon: '🪒', duration: '20 دقيقة' },
  { id: 's3', name: 'حلاقة + دقن', icon: '💈', duration: '45 دقيقة' },
  { id: 's4', name: 'هيدروفيشيل', icon: '💧', duration: '60 دقيقة' },
  { id: 's5', name: 'ليزر', icon: '⚡', duration: '45 دقيقة' },
];

const BARBERS = [
  { id: 'b1', name: 'يوسف', avatar: '👨‍🦱' },
  { id: 'b2', name: 'فاروق', avatar: '👨‍🦰' },
  { id: 'b3', name: 'السيد', avatar: '👨' },
  { id: 'b4', name: 'كريم', avatar: '👨‍🦳' },
  { id: 'b5', name: 'صبحي', avatar: '👨‍🦲' },
  { id: 'b6', name: 'دونجة', avatar: '👨‍🦱' },
  { id: 'b7', name: 'ادهم', avatar: '👦' },
];

const TIMES = [
  '9:00 ص','9:30 ص','10:00 ص','10:30 ص',
  '11:00 ص','11:30 ص','12:00 م','12:30 م',
  '1:00 م','1:30 م','2:00 م','2:30 م',
  '3:00 م','3:30 م','4:00 م','4:30 م',
  '5:00 م','5:30 م','6:00 م','6:30 م',
];

// State
let bookings = JSON.parse(localStorage.getItem('salon_bookings') || '[]');
let selectedService = null, selectedBarber = null, selectedTime = null;

// ====== INIT ======
function init() {
  renderServices();
  renderBarbers();
  renderSlots();
  updateQueue();
}

function saveBookings() {
  localStorage.setItem('salon_bookings', JSON.stringify(bookings));
}

// ====== SERVICES ======
function renderServices() {
  const grid = document.getElementById('services-grid');
  grid.innerHTML = SERVICES.map(s => `
    <div class="service-card ${selectedService===s.id?'selected':''}" onclick="selectService('${s.id}')">
      <span class="svc-icon">${s.icon}</span>
      <div class="svc-name">${s.name}</div>
      <div class="svc-dur">${s.duration}</div>
    </div>
  `).join('');
}

function selectService(id) {
  selectedService = id;
  renderServices();
}

// ====== BARBERS ======
function renderBarbers() {
  const row = document.getElementById('barbers-row');
  row.innerHTML = BARBERS.map(b => `
    <div class="barber-card ${selectedBarber===b.id?'selected':''}" onclick="selectBarber('${b.id}')">
      <div class="barber-avatar">${b.avatar}</div>
      <div class="barber-name">${b.name}</div>
    </div>
  `).join('');
}

function selectBarber(id) {
  selectedBarber = id;
  selectedTime = null;
  renderBarbers();
  renderSlots();
}

// ====== SLOTS ======
function getBookedSlots(barberId) {
  return bookings
    .filter(b => b.barberId === barberId && b.status !== 'done')
    .map(b => b.time);
}

function renderSlots() {
  const grid = document.getElementById('slots-grid');
  const booked = selectedBarber ? getBookedSlots(selectedBarber) : [];
  grid.innerHTML = TIMES.map(t => {
    const isBooked = booked.includes(t);
    const isSelected = selectedTime === t;
    return `<div class="slot ${isBooked?'booked':''} ${isSelected&&!isBooked?'selected':''}"
      onclick="${isBooked?'':'selectTime(\''+t+'\')'}">${t}</div>`;
  }).join('');
}

function selectTime(t) {
  if (!selectedBarber) { alert('⚠️ اختر الحلاق أولاً'); return; }
  selectedTime = t;
  renderSlots();
}

// ====== QUEUE ======
function updateQueue() {
  const pending = bookings.filter(b => b.status === 'pending').length;
  document.getElementById('queue-num').textContent = pending;
}

// ====== BOOKING ======
function submitBooking() {
  const name = document.getElementById('customer-name').value.trim();
  if (!name) { alert('⚠️ من فضلك اكتب اسمك'); return; }
  if (!selectedService) { alert('⚠️ اختر الخدمة'); return; }
  if (!selectedBarber) { alert('⚠️ اختر الحلاق'); return; }
  if (!selectedTime) { alert('⚠️ اختر الميعاد'); return; }

  // Double booking check
  const conflict = bookings.find(b =>
    b.barberId === selectedBarber &&
    b.time === selectedTime &&
    b.status !== 'done'
  );
  if (conflict) {
    alert('⚠️ هذا الميعاد محجوز مع هذا الحلاق، اختر ميعاد آخر');
    return;
  }

  const svc = SERVICES.find(s => s.id === selectedService);
  const barber = BARBERS.find(b => b.id === selectedBarber);
  const booking = {
    id: Date.now(),
    name, time: selectedTime,
    serviceId: selectedService, serviceName: svc.name,
    barberId: selectedBarber, barberName: barber.name,
    status: 'pending',
    createdAt: new Date().toLocaleTimeString('ar-EG')
  };

  bookings.push(booking);
  saveBookings();
  updateQueue();
  showConfirm(booking);

  // Reset
  selectedService = null; selectedBarber = null; selectedTime = null;
  document.getElementById('customer-name').value = '';
  renderServices(); renderBarbers(); renderSlots();
}

// ====== CONFIRM ======
function showConfirm(b) {
  const pending = bookings.filter(x => x.status === 'pending').length;
  document.getElementById('confirm-details').innerHTML = `
    <p>👤 الاسم: <span>${b.name}</span></p>
    <p>✂️ الخدمة: <span>${b.serviceName}</span></p>
    <p>👨 الحلاق: <span>${b.barberName}</span></p>
    <p>🕐 الميعاد: <span>${b.time}</span></p>
    <p>📋 دورك: <span>${pending}</span></p>
  `;
  const msg = encodeURIComponent(
    `مرحباً، أريد تأكيد حجزي في صالون المغيني\n👤 الاسم: ${b.name}\n✂️ الخدمة: ${b.serviceName}\n👨 الحلاق: ${b.barberName}\n🕐 الميعاد: ${b.time}`
  );
  document.getElementById('wa-link').href = `https://wa.me/${WHATSAPP_NUMBER}?text=${msg}`;
  document.getElementById('confirm-overlay').classList.add('show');
}

function closeConfirm() {
  document.getElementById('confirm-overlay').classList.remove('show');
}

// ====== TABS ======
function showTab(tab) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  event.target.classList.add('active');
  if (tab === 'admin') renderAdmin();
}

// ====== ADMIN ======
function adminLogin() {
  const pass = document.getElementById('admin-pass').value;
  if (pass === ADMIN_PASSWORD) {
    document.getElementById('admin-login-section').style.display = 'none';
    document.getElementById('admin-panel').style.display = 'block';
    renderAdmin();
  } else {
    alert('❌ كلمة المرور غلط');
  }
}

function renderAdmin() {
  const total = bookings.length;
  const pending = bookings.filter(b => b.status === 'pending').length;
  const done = bookings.filter(b => b.status === 'done').length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-pending').textContent = pending;
  document.getElementById('stat-done').textContent = done;

  const list = document.getElementById('bookings-list');
  if (bookings.length === 0) {
    list.innerHTML = `<div class="empty-state"><p style="font-size:40px">📭</p><p>لا توجد حجوزات بعد</p></div>`;
    return;
  }

  const sorted = [...bookings].reverse();
  list.innerHTML = sorted.map(b => `
    <div class="booking-item" id="bk-${b.id}">
      <div class="booking-info">
        <p>${b.name}</p>
        <small>${b.serviceName} • ${b.barberName} • ${b.time}</small>
      </div>
      <div style="display:flex;gap:6px;align-items:center;flex-shrink:0">
        <span class="status-badge ${b.status==='done'?'status-done':'status-pending'}">
          ${b.status==='done'?'✓ منتهي':'⏳ بانتظار'}
        </span>
        ${b.status!=='done'?`<button class="btn-done" onclick="markDone(${b.id})">تم</button>`:''}
        <button class="btn-delete" onclick="deleteBooking(${b.id})">🗑</button>
      </div>
    </div>
  `).join('');
}

function markDone(id) {
  const b = bookings.find(x => x.id === id);
  if (b) { b.status = 'done'; saveBookings(); updateQueue(); renderAdmin(); renderSlots(); }
}

function deleteBooking(id) {
  if (!confirm('حذف هذا الحجز؟')) return;
  bookings = bookings.filter(x => x.id !== id);
  saveBookings(); updateQueue(); renderAdmin(); renderSlots();
}

function clearDone() {
  if (!confirm('مسح كل الحجوزات المنتهية؟')) return;
  bookings = bookings.filter(b => b.status !== 'done');
  saveBookings(); renderAdmin();
}

init();
</script>
</body>
</html>
